version: '3.9'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-pdlc-backend_cntr
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}

      QDRANT_URL: ${QDRANT_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-3.5-turbo}
      LLM_API_KEY: ${LLM_API_KEY:-your-api-key-here}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://openrouter.ai/api/v1}
      ENVIRONMENT: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - ./app:/app/app
    networks:
      - app-network

  # React Frontend
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ai-pdlc-frontend_cntr
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    driver: bridge
